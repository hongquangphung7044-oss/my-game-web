<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1,user-scalable=no">
  <title>方块远境 · 网页版</title><link rel="stylesheet" href="./style.css">
</head>
<body>
<main id="app"><canvas id="game"></canvas><div id="loading">正在载入方块远境…</div>
<div id="hud" class="hidden">
 <div id="top"><div id="bars"><span class="hp">❤ ❤ ❤ ❤ ❤</span><span class="food">● ● ● ● ●</span></div><span id="state">生存 · 白天</span><span id="coords"></span><button id="menuBtn">☰</button></div>
 <div id="cross">+</div><div id="toast"></div>
 <div id="touch">
  <div id="stick"><i></i></div><div id="look"></div>
  <div id="actions"><button id="up" class="round">↑<small>跳跃 / 上升</small></button><button id="down" class="round hidden">↓<small>下降</small></button><button id="fly" class="round hidden">🪽<small>飞行</small></button><button id="mine" class="round warn">⛏<small>挖掘</small></button><button id="place" class="round ok">▣<small>放置</small></button></div>
 </div>
 <div id="hotbar"></div>
</div>
<section id="start" class="card"><h1>方块远境</h1><p>第三人称 · 横屏多点触控 · 离线存档</p><p class="small">左侧摇杆移动；右侧滑动转视角。可以同时按住摇杆、转视角及操作按键。</p><button id="newGame" class="primary">新建世界</button><button id="continue" class="secondary hidden">继续世界</button></section>
<section id="menu" class="card hidden"><h2>游戏菜单</h2><button id="resume" class="primary">继续游戏</button><button id="mode" class="secondary">切换至创造模式</button><button id="view" class="secondary">镜头：第三人称</button><button id="save" class="secondary">立即保存</button><button id="reset" class="danger">重置世界</button><p class="small">创造模式：点击 🪽 开启飞行；↑ 上升、↓ 下降。</p></section>
</main><script type="module" src="./game.js"></script></body></html>
